server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Hide the nginx version banner (M8).
    server_tokens off;

    # Security headers applied to every response (M8).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'; font-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;

    # Large telemetry ZIP uploads. Keep this aligned with the backend
    # MAX_UPLOAD_MB env (default 5120 MB == 5g); bump both together if changed (M10).
    client_max_body_size 5g;

    # Reverse-proxy API + SSE to the backend service.
    location /api/ {
        proxy_pass http://backend:5001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Server-Sent Events: no buffering, keep the connection open.
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # PWA: serve the web manifest with the correct MIME type, and never cache the
    # service worker / registration so `autoUpdate` clients pick up new builds.
    location = /manifest.webmanifest {
        default_type application/manifest+json;
        add_header Cache-Control "no-cache" always;
    }
    location = /sw.js {
        add_header Cache-Control "no-cache" always;
    }
    location = /registerSW.js {
        add_header Cache-Control "no-cache" always;
    }

    # Defense-in-depth: never serve source maps even if one ever ends up in the
    # bundle. The production build emits none (vite build.sourcemap = false), so
    # this only ever returns 404 — it guards against an accidental regression.
    location ~ \.map$ {
        return 404;
    }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # The SPA entry point must never be cached so clients always pick up the
    # latest hashed asset references after a redeploy (M8). Re-declare the
    # security headers here because a nested `add_header` resets inherited ones.
    location = /index.html {
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'; font-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;
        add_header Cache-Control "no-cache" always;
    }
}
